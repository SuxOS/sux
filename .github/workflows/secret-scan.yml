name: Secret scan

# Scans the repo for committed secrets on every push and pull request, and
# FAILS the build if gitleaks detects anything. Guards against a repeat of the
# CapSolver-key-in-repo incident. Allowlist lives in .gitleaks.toml at the root.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action@v2's hosted wrapper now gates ANY organization repo behind
    # a paid GITLEAKS_LICENSE ("[org] is an organization. License key is
    # required.") — a breaking change on their end that tripped the moment this
    # repo moved from a personal account into SuxOS. The underlying gitleaks
    # scanner is free/OSS; only their SaaS wrapper action requires a license.
    # Run the free CLI directly instead — same check name (branch protection
    # keys on it), same fail-closed behavior (a download/scan failure fails the
    # job, it never silently no-ops).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          set -euo pipefail
          ver="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -m1 '"tag_name"' | cut -d '"' -f4)"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${ver}/gitleaks_${ver#v}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact -v
