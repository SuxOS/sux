name: CI

# Triggers on every push and pull request (all branches) — fails on any error.
# Also runs on merge_group so the "Type-check & build" required check reports on the
# queue's speculative ref; without it the merge queue would freeze waiting forever.
# The push trigger EXCLUDES the queue's synthetic gh-readonly-queue/** branches: the
# merge_group run already covers that ref, and letting push also fire there would share
# the ref-keyed, cancel-in-progress concurrency group and cancel the merge_group run —
# a cancelled required check stalls the queue.
# Reusable workflow: SuxOS/.github/.github/workflows/ci.yml (concurrency group lives there).

on:
  push:
    branches-ignore:
      - "gh-readonly-queue/**"
  pull_request:
  merge_group:

jobs:
  check:
    permissions:
      contents: read
    uses: SuxOS/.github/.github/workflows/ci.yml@main
    with:
      # check:node — the installer (root@192.168.1.1) embeds node/server.mjs as a base64
      # blob; fails if it's drifted from server.mjs (fix: npm run build:node). Guards
      # against shipping a stale residential node.
      # lint:dispatcher-docs — namespace dispatcher (vault/mail/files/calendar/contact)
      # description strings carry worked example calls that have drifted from the real
      # target tool's inputSchema before (#202, #205, #206) and silently misled callers.
      extra-checks-scripts: "check:node lint:dispatcher-docs"
    secrets: inherit
