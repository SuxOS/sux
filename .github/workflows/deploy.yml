name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      # Deploys code + wrangler.jsonc vars. Does NOT touch secrets
      # (KAGI_API_KEY, GITHUB_CLIENT_ID/SECRET, COOKIE_ENCRYPTION_KEY,
      # ALLOWED_GITHUB_LOGIN) — manage those with `wrangler secret put`.
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
