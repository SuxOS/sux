name: Triage

# Investigator stage: independently re-checks every untriaged issue (fixer's proposals AND
# ones a human filed), assigns its own type + confidence, opt-out-queues most for build
# (fires issue-build.yml via the queued-for-build label). Fires on a newly-filed issue;
# workflow_dispatch drains the whole untriaged backlog on demand. Runs on the Claude Pro/Max
# subscription (CLAUDE_CODE_OAUTH_TOKEN).
# Reusable workflow: SuxOS/.github/.github/workflows/triage.yml

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:

jobs:
  triage:
    # Actor gate (visible; the reusable also enforces it centrally): only a trusted author can
    # drive triage via an issues event. Dispatch/schedule already require write access.
    if: >-
      github.event_name != 'issues' ||
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
    # Grant exactly what triage.yml needs (default token is read-only → reusable would startup-fail).
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/triage.yml@main
    secrets: inherit
