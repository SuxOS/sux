name: Merge queue watch

# Read-only merge-queue watcher: lists in-merge-queue PRs, recent issues, recent Actions
# runs into a rolling tracking issue. Never mutates a PR. Deployed 2026-07 as part of the
# budget/cadence redesign (org has two monitoring reusables no repo used yet — see
# SuxOS/.github docs/design/budget-and-cadence.md and its README's "Budget & deep passes"
# section).
# Reusable workflow: SuxOS/.github/.github/workflows/waitch.yml

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  waitch:
    permissions:
      contents: read
      issues: write
      actions: read
    uses: SuxOS/.github/.github/workflows/waitch.yml@main
    secrets: inherit
