name: Skill sync

# Keeps the sux skill, its plugin copy, and the generated function reference in sync — all
# derived from the repo itself (sux/src/fns/*.ts), no live server or secrets required.
# check job — gates PRs that touch the skill / functions / script, and runs on the weekly
#             schedule + manual dispatch. Offline, no secrets.
# fix job   — schedule / manual dispatch only: re-mirrors the plugin skill, then opens/
#             refreshes a PR on `bot/docs-update` if anything changed. Needs the repo
#             setting "Allow GitHub Actions to create and approve pull requests".
# Reusable workflow: SuxOS/.github/.github/workflows/skill-sync.yml

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - '.claude/skills/**'
      - 'plugins/sux/skills/**'
      - 'sux/src/fns/**'
      - 'sux/scripts/gen-docs.mjs'
      - 'docs/claude-profile-snippet.md'
      - 'scripts/check-skill-sync.mjs'
      - '.github/workflows/skill-sync.yml'
  # #1335: skill-sync isn't in main's required checks, so a PR whose OWN skill-sync run went
  # red (e.g. a new fn landing without a SKILL.md mention) can still auto-merge — and once
  # main itself carries the drift, EVERY subsequent PR's skill-sync goes red regardless of
  # that PR's own content. This push trigger doesn't gate anything (the reusable workflow's
  # `fix` job only runs on schedule/workflow_dispatch), it just makes main-side drift show up
  # as a red check on main within minutes instead of silently waiting for the Monday cron.
  push:
    branches:
      - main
    paths:
      - '.claude/skills/**'
      - 'plugins/sux/skills/**'
      - 'sux/src/fns/**'
      - 'sux/scripts/gen-docs.mjs'
      - 'docs/claude-profile-snippet.md'
      - 'scripts/check-skill-sync.mjs'

jobs:
  skill-sync:
    permissions:
      contents: write
      pull-requests: write
    uses: SuxOS/.github/.github/workflows/skill-sync.yml@main
    secrets: inherit
