name: Actions budget guard

# Hourly (+ on demand) spend brake: pauses only the discretionary spenners ‚Äî the @claude
# bot, the CI autofix bot, and the propose‚Üíinvestigate‚Üíbuild backlog pipeline ‚Äî when the
# account's used Actions minutes cross a soft cap, and resumes them below a lower threshold
# (hysteresis). Never touches ci/deploy/security-review/audit ‚Äî pausing a safety or deploy
# gate is worse than overspending. If the billing read fails, it does nothing.
# Reusable workflow: SuxOS/.github/.github/workflows/budget-guard.yml

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  guard:
    permissions:
      actions: write
      contents: read
      issues: write
    uses: SuxOS/.github/.github/workflows/budget-guard.yml@main
    with:
      discretionary-workflows: "claude.yml claude-autofix.yml fixer.yml triage.yml issue-build.yml"
    secrets: inherit
