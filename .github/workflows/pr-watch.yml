name: Stuck-PR watcher

# Read-only visibility net for the autonomy pipeline. Every 6h (and on demand) it
# lists open PRs and flags the ones that are silently stalled:
#   - a failing required check, or
#   - green + mergeable but auto-merge was never armed and it's been idle >STALE_HOURS.
# NOTE: BEHIND-main is intentionally NOT flagged (flag-behind: false below). Under the
# GitHub merge queue a PR no longer needs to be up-to-date with main to merge — the queue
# rebases it onto the queue head as part of forming the merge group — so "behind main" is
# expected, not stuck. (This is also why pr-auto-update.yml was retired.)
# It NEVER merges or mutates a PR. Reusable workflow: SuxOS/.github/.github/workflows/pr-watch.yml

on:
  schedule:
    - cron: "23 */6 * * *" # every 6 hours (offset minute to dodge the top-of-hour rush)
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

jobs:
  watch:
    permissions:
      contents: read
      pull-requests: read
      issues: write
      checks: read
      statuses: read
    uses: SuxOS/.github/.github/workflows/pr-watch.yml@main
    with:
      flag-behind: false
    secrets: inherit
